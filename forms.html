<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Sample Form</h1>
    <form>
        <label for="fullname">Full Name:</label> <br>
        <input type="text" name="fullname" id="fullname"><br><br>
        <label for="age">Age:</label> <br>
        <input type="number"><br><br>
        <label for="Password">Password</label> <br>
        <input type="password"><br><br>
        <label for="Email">Email</label> <br>
        <input type="email"><br><br>
        <label for="Date">DOB</label> <br>
        <input type="date"><br><br>
        <label for="telephone">Telephone</label> <br>
        <input type="tel"> <br><br>
        <label for="">Skills</label><br>
        <input type="checkbox" name="skills"> Web Development <br>
        <input type="checkbox" name="skills"> Mobile Development <br>
        <input type="checkbox" name="skills"> Data Science <br>
        <input type="checkbox" name="skills"> Cloud Computing <br>
        <input type="checkbox" name="skills"> Cybersecurity <br>
        <input type="checkbox" name="skills"> Artificial Intelligence <br><br>
        <label for="">Gender</label> <br>
        <input type="radio" name="Gender">Female <br>
        <input type="radio" name="Gender">Male <br> <br>
        <input type="submit" value="Register">
    </form>
</body>
</html>
