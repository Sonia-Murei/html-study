<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>
    <form>
        <label for="">First Name:</label>
        <input type="text">
        <label for="">Last Name:</label>
        <input type="text"> <br> <br>
        <label for="">Date of Birth:</label>
        <input type="date">
        <label for="">Age:</label>
        <input type="number"> <br> <br>
        <label for="">Gender:</label>
        <select name="" id=""> 
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
        <label for="">Email Address:</label>
        <input placeholder="Enter email address" type="email"> <br> <br>
        <label for="">Positions Available:</label>
        <input type="radio" name="positions">Junior Developer
        <input type="radio" name="positions">Mid-level Developer
        <input type="radio" name="positions">Senior Developer <br><br>
        <label for="">Programming Languages:</label>
        <input type="checkbox" name="languages">Java
        <input type="checkbox" name="languages">JavaScript
        <input type="checkbox" name="languages">Python <br> <br>
        <label for="">Password:</label>
        <input type="password">
        <label for="">Confirm Password:</label>
        <input type="password"> <br> <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
